# AtlasMeet Nginx Reverse Proxy Configuration

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Increase client max body size to allow large audio file uploads for transcription (e.g. 50MB)
    client_max_body_size 50M;

    # Upstream backend definition for Express mail APIs (Load Balancing)
    upstream express_mail_backend {
        # Round-robin load balancing with failover settings
        server 127.0.0.1:3000 max_fails=3 fail_timeout=10s;
        server 127.0.0.1:3001 max_fails=3 fail_timeout=10s;
    }

    server {
        listen       80;
        server_name  localhost;

        # 1. FRONTEND: Serve built React SPA or proxy to Vite dev server
        location / {
            # For production deployment:
            # root   c:/Users/sande/OneDrive/Documents/coding/meeting-minutes/web-app/dist;
            # index  index.html index.htm;
            # try_files $uri $uri/ /index.html;

            # For local dev proxying (proxying to Vite server):
            proxy_pass http://localhost:5173;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # 2. SMTP MAIL SERVICES: Load balanced across Express endpoints
        location ~ ^/api/auth/(send-otp|send-reset-code|send-invite|send-meeting-log) {
            proxy_pass http://express_mail_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 3. BACKEND: Redirect remaining /api and auth calls to FastAPI Backend Server
        location /api {
            # Strip /api prefix if needed (FastAPI routes have /api included in some paths, but let's check)
            # In our main.py, auth paths are "/api/auth/login", "/api/auth/register", "/api/auth/me"
            # and admin paths are "/api/admin/metrics", "/api/admin/users", etc.
            # Other meeting endpoints are "/get-meetings", "/get-meeting", etc.
            # So let's proxy `/api` directly, and also handle the other meeting paths:
            proxy_pass http://localhost:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Legacy meeting backend endpoints (without /api prefix)
        location ~ ^/(get-meetings|get-meeting|save-meeting-title|delete-meeting|process-transcript|get-summary|save-transcript|get-model-config|save-model-config|get-transcript-config|save-transcript-config|get-api-key|get-transcript-api-key|save-meeting-summary|search-transcripts) {
            proxy_pass http://localhost:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 3. Custom Error Pages
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }
}
